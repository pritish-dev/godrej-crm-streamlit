name: Google Reviews Fetch (Daily 10 PM)

on:
  schedule:
    # All times in UTC. IST = UTC + 5:30
    - cron: '30 16 * * *'   # 10:00 PM IST → Google Reviews Fetch

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  google-reviews-fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -f streamlit_app/requirements.txt ]; then
            pip install -r streamlit_app/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Fetch and Update Google Reviews (Daily 10 PM)
        env:
          GOOGLE_CREDENTIALS:   ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_ACCESS_TOKEN:  ${{ secrets.GOOGLE_ACCESS_TOKEN }}
          GOOGLE_LOCATION_ID:   ${{ secrets.GOOGLE_LOCATION_ID }}
        run: |
          cd streamlit_app
          python google_reviews_update_job.py