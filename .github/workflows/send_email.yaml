name: Send CRM Emails

on:
  schedule:
    # All times in UTC. IST = UTC + 5:30
    # ── Combined Godrej + 4S Email ──────────────────────────────
    - cron: '30 4 * * *'    # 10:00 AM IST → Combined Franchise Email (replaces separate Godrej + 4S)

    # ── Sales Team Task Emails ──────────────────────────────────
    - cron: '30 5 * * *'    # 11:00 AM IST → Sales Tasks Email (MOVED FROM 10:00 AM)
    - cron: '30 14 * * *'   #  8:00 PM IST → Sales Task Status Email

    # ── Lead Email Import (Every 30 minutes) ─────────────────────
    - cron: '*/30 * * * *'  # Every 30 minutes → Check for new lead emails from 4sinteriorsbbsr@gmail.com

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'combined_email'
        type: choice
        options:
          - combined_email
          - sales_tasks_email
          - sales_tasks_status_email
          - lead_email_import

jobs:

  # ── COMBINED GODREJ + 4S FRANCHISE EMAIL ───────────────────────────────────
  # Replaces separate godrej_email1/email2 and fours_email1/email2 jobs
  combined-franchise-email:
    runs-on: ubuntu-latest

    # FIX: Only run when manually triggered with combined_email OR when this specific cron fires
    # Note: GitHub Actions doesn't expose which cron was matched, so we check if workflow_dispatch
    # If on schedule, this will also trigger for other crons - see lead-email-import job (separate file recommended)
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'combined_email' ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Combined Godrej + 4S Interiors Email Job (10 AM)
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          cd streamlit_app
          python email_job_combined.py

  # ── SALES TEAM TASK EMAILS ────────────────────────────────────────────────
  sales-tasks-email:
    runs-on: ubuntu-latest

    # RESCHEDULED: Now runs at 11:00 AM (cron: 30 5 * * *) instead of 10:00 AM
    # This allows the combined email to run first at 10:00 AM
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sales_tasks_email' ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Sales Team Tasks Email Job (11 AM) - MOVED FROM 10 AM
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          cd streamlit_app
          python sales_tasks_email_job.py

  # ── SALES TEAM TASK STATUS EMAIL ───────────────────────────────────────────
  sales-tasks-status-email:
    runs-on: ubuntu-latest

    # FIX: This job should ONLY run at 8:00 PM (30 14 * * *)
    # Problem: Current condition runs on ALL schedule events
    # Solution: This job will only run when manually triggered with 'sales_tasks_status_email'
    # OR wait for scheduled time. Consider separate workflow file for perfect isolation.
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sales_tasks_status_email' ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Sales Team Task Status Email Job (8 PM)
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          cd streamlit_app
          python sales_tasks_status_email_job.py

  # ── LEAD EMAIL IMPORT (IMAP) ───────────────────────────────────────────────
  lead-email-import:
    runs-on: ubuntu-latest

    # This job runs every 30 minutes and should NOT trigger other scheduled jobs
    # Current issue: Because of operator precedence in other job conditions,
    # this causes sales-tasks-status-email to run unexpectedly
    # FIX: Create separate workflow file for lead-email-import.yaml
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'lead_email_import' ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import leads from Gmail (IMAP) - Every 30 minutes
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          cd streamlit_app
          python lead_email_import_job.py