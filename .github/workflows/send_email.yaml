name: Send CRM Emails

on:
  schedule:
    # All times in UTC. IST = UTC + 5:30
    # ── Godrej CRM ──────────────────────────────────────────
    - cron: '30 4 * * *'    # 10:00 AM IST → Godrej Email 1 (Morning)
    - cron: '30 5 * * *'    # 11:00 AM IST → Godrej Email 2 (Update Reminder)
    - cron: '30 11 * * *'   #  5:00 PM IST → Godrej Email 1 (Evening)

    # ── 4S Interiors CRM ────────────────────────────────────
    - cron: '32 4 * * *'    # 10:02 AM IST → 4S Email 1 (Morning)  [2min offset]
    - cron: '32 5 * * *'    # 11:02 AM IST → 4S Email 2 (Update Reminder)
    - cron: '32 11 * * *'   #  5:02 PM IST → 4S Email 1 (Evening)

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'godrej_email1'
        type: choice
        options:
          - godrej_email1
          - godrej_email2
          - fours_email1
          - fours_email2

jobs:

  # ── GODREJ CRM EMAILS ──────────────────────────────────────────────────────
  godrej-crm-email:
    runs-on: ubuntu-latest

    # Only run on Godrej-related cron triggers or manual godrej selection
    if: |
      github.event_name == 'workflow_dispatch' && (
        github.event.inputs.job == 'godrej_email1' ||
        github.event.inputs.job == 'godrej_email2'
      ) ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials to file
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/google_credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/google_credentials.json" >> $GITHUB_ENV

      - name: Run Godrej email job
        env:
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:  ${{ secrets.EMAIL_RECIPIENTS }}
          MANUAL_JOB:        ${{ github.event.inputs.job }}
        run: |
          cd streamlit_app
          python email_job.py

  # ── 4S INTERIORS CRM EMAILS ────────────────────────────────────────────────
  4s-crm-email:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' && (
        github.event.inputs.job == 'fours_email1' ||
        github.event.inputs.job == 'fours_email2'
      ) ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials to file
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/google_credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/google_credentials.json" >> $GITHUB_ENV

      - name: Run 4S Interiors email job
        env:
          EMAIL_SENDER_4S:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD_4S:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS_4S:  ${{ secrets.EMAIL_RECIPIENTS }}
          MANUAL_JOB:           ${{ github.event.inputs.job }}
        run: |
          cd streamlit_app
          python email_job_4s.py