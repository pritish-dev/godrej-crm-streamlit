name: CRM Pending Delivery Alerts

on:
  schedule:
    # All times UTC.  IST = UTC + 5:30
    - cron: '30 1 * * *'    # 07:00 AM IST  →  morning alert
    - cron: '30 10 * * *'   # 04:00 PM IST  →  evening alert

  workflow_dispatch:
    inputs:
      slot:
        description: 'Which slot to send (morning = 7 AM alert, evening = 4 PM alert)'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  delivery-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f streamlit_app/requirements.txt ]; then
            pip install -r streamlit_app/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run combined delivery alert job
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          cd streamlit_app

          # Map cron schedule → SLOT.  Manual dispatch uses the input directly.
          SCHEDULE="${{ github.event.schedule }}"
          MANUAL="${{ github.event.inputs.slot }}"

          if   [ "$SCHEDULE" = "30 1 * * *"  ]; then export SLOT=morning
          elif [ "$SCHEDULE" = "30 10 * * *" ]; then export SLOT=evening
          elif [ -n "$MANUAL"               ]; then export SLOT=$MANUAL
          fi

          echo "SLOT=${SLOT:-unset}  SCHEDULE=${SCHEDULE:-manual}  MANUAL=${MANUAL:-}"
          python email_job.py
