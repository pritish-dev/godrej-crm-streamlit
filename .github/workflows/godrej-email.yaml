name: CRM Pending Delivery Emails

on:
  schedule:
    # All times UTC. IST = UTC+5:30
    - cron: '30 2 * * *'    # 08:00 AM IST → Morning Delivery Report (D-1 cutoff)
    - cron: '30 3 * * *'    # 09:00 AM IST → Delivery Status Reminder (all overdue+today)
    - cron: '30 9 * * *'    # 03:00 PM IST → Evening Delivery Report (all overdue+today)

  workflow_dispatch:
    inputs:
      job:
        description: 'Which delivery email to send'
        required: true
        default: 'crm_email1'
        type: choice
        options:
          - crm_email1    # Morning: delivery_date ≤ yesterday (D-1)
          - crm_email2    # Reminder: delivery_date ≤ today (all overdue)
          - crm_email3    # Evening: delivery_date ≤ today (all overdue)

jobs:
  crm-delivery-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f streamlit_app/requirements.txt ]; then
            pip install -r streamlit_app/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run delivery email job
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          MANUAL_JOB:         ${{ github.event.inputs.job }}
        run: |
          cd streamlit_app

          # Map cron schedule → SLOT (immune to GitHub Actions clock drift).
          # SLOT is the ONLY thing that decides which email is sent for a
          # scheduled run — see email_job.py (no hour-fallback any more).
          SCHEDULE="${{ github.event.schedule }}"
          if   [ "$SCHEDULE" = "30 2 * * *" ]; then export SLOT=morning
          elif [ "$SCHEDULE" = "30 3 * * *" ]; then export SLOT=reminder
          elif [ "$SCHEDULE" = "30 9 * * *" ]; then export SLOT=evening
          fi

          echo "SLOT=${SLOT:-unset}  SCHEDULE=${SCHEDULE:-manual}  MANUAL_JOB=${MANUAL_JOB:-}"
          python email_job.py
