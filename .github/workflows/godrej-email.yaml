name: CRM Pending Delivery Emails (Franchise + 4S Interiors)

on:
  schedule:
    # All times in UTC. IST = UTC + 5:30
    - cron: '30 4 * * *'    # 10:00 AM IST → Morning Pending Delivery Report
    - cron: '30 5 * * *'    # 11:00 AM IST → Update Delivery Status Reminder
    - cron: '30 11 * * *'   # 05:00 PM IST → Evening Pending Delivery Report

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:
    inputs:
      job:
        description: 'Which email to send'
        required: true
        default: 'crm_email1'
        type: choice
        options:
          - crm_email1    # Morning Pending Delivery Report
          - crm_email2    # Update Delivery Status Reminder
          - crm_email3    # Evening Pending Delivery Report

jobs:
  crm-email:
    runs-on: ubuntu-latest

    if: >-
      github.event_name == 'schedule' ||
      (
        github.event_name == 'workflow_dispatch' &&
        (
          github.event.inputs.job == 'crm_email1' ||
          github.event.inputs.job == 'crm_email2' ||
          github.event.inputs.job == 'crm_email3'
        )
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -f streamlit_app/requirements.txt ]; then
            pip install -r streamlit_app/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run unified CRM email job (Franchise + 4S Interiors)
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          MANUAL_JOB:         ${{ github.event.inputs.job }}
        run: |
          cd streamlit_app

          # Map the triggering cron → SLOT so email_job.py routes correctly
          # regardless of GitHub Actions scheduler clock drift (can be 15–60 min late)
          SCHEDULE="${{ github.event.schedule }}"
          if   [ "$SCHEDULE" = "30 4 * * *" ];  then export SLOT=morning
          elif [ "$SCHEDULE" = "30 5 * * *" ];  then export SLOT=reminder
          elif [ "$SCHEDULE" = "30 11 * * *" ]; then export SLOT=evening
          fi

          echo "SLOT=${SLOT:-unset}  SCHEDULE=${SCHEDULE:-manual}"
          python email_job.py
