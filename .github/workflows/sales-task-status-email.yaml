name: Sales Team Task Status Email (Evening)

on:
  schedule:
    # All times in UTC. IST = UTC + 5:30
    # Triple-fire window to absorb GitHub Actions cron drift; the script
    # itself is idempotent via was_email_sent_today() — only the first
    # successful run actually sends.
    - cron: '25 12 * * *'   # 12:25 UTC = 17:55 IST  (primary, early)
    - cron: '30 12 * * *'   # 12:30 UTC = 18:00 IST  (primary, on-time)
    - cron: '50 12 * * *'   # 12:50 UTC = 18:20 IST  (drift backup)

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

concurrency:
  group: sales-task-status-email-evening
  cancel-in-progress: false

jobs:
  # ── SALES TEAM TASK STATUS EMAIL ───────────────────────────────────────────
  sales-task-status-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -f streamlit_app/requirements.txt ]; then
            pip install -r streamlit_app/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run Sales Team Task Status Email Job
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          cd streamlit_app
          python sales_tasks_status_email_job.py
