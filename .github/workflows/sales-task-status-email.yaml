name: Sales Team Task Status Email (Evening 8 PM)

on:
  schedule:
    # All times in UTC. IST = UTC + 5:30
    - cron: '30 14 * * *'   # 8:00 PM IST → Sales Task Status Email

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  # ── SALES TEAM TASK STATUS EMAIL ───────────────────────────────────────────
  sales-task-status-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -f streamlit_app/requirements.txt ]; then
            pip install -r streamlit_app/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run Sales Team Task Status Email Job
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          cd streamlit_app
          python sales_tasks_status_email_job.py
