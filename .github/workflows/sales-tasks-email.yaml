name: Sales Team Tasks Email (Morning 10 AM)

on:
  schedule:
    # All times in UTC. IST = UTC + 5:30
    - cron: '30 4 * * *'    # 10:00 AM IST → Sales Tasks Email

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  # ── SALES TEAM TASK EMAILS ────────────────────────────────────────────────
  sales-tasks-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Sales Team Tasks Email Job
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          cd streamlit_app
          python sales_tasks_email_job.py
