name: Sales Team Tasks Email (Morning)

on:
  schedule:
    # All times UTC. IST = UTC+5:30
    # GitHub Actions crons are best-effort — runs are routinely delayed by
    # 5–30 min and very occasionally skipped. Fire three times in a tight
    # window to make sure the morning briefing always lands. The job is
    # idempotent — send_sales_team_tasks_email just composes today's task
    # snapshot from SALES_TEAM_TASK + TASK_LOGS, so duplicate emails would
    # carry the same content. To prevent that, we add a sentinel below
    # (see the "Skip if already sent today" step).
    - cron: '25 3 * * *'    # 03:25 UTC = 08:55 IST  (primary, early)
    - cron: '30 3 * * *'    # 03:30 UTC = 09:00 IST  (primary, on-time)
    - cron: '50 3 * * *'    # 03:50 UTC = 09:20 IST  (drift backup)

  workflow_dispatch:

# Cancel any in-flight run from an earlier cron in the same window
concurrency:
  group: sales-tasks-email-morning
  cancel-in-progress: false

jobs:
  sales-tasks-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f streamlit_app/requirements.txt ]; then
            pip install -r streamlit_app/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run sales team tasks email
        # Single-purpose workflow: only the 11→9 AM IST cron above triggers it.
        # No SLOT logic needed — the script always runs the same email.
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          cd streamlit_app
          python sales_tasks_email_job.py
