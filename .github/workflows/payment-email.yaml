name: CRM Payment Due Emails

on:
  schedule:
    # All times UTC. IST = UTC+5:30
    - cron: '30 4 * * *'    # 10:00 AM IST → Payment Due Morning (delivery_date ≤ yesterday)
    - cron: '30 5 * * *'    # 11:00 AM IST → Payment Due Reminder (all overdue+today)

  workflow_dispatch:
    inputs:
      job:
        description: 'Which payment email to send'
        required: true
        default: 'payment_morning'
        type: choice
        options:
          - payment_morning    # delivery_date ≤ yesterday, PENDING_DUE > 0
          - payment_reminder   # delivery_date ≤ today, PENDING_DUE > 0

jobs:
  crm-payment-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f streamlit_app/requirements.txt ]; then
            pip install -r streamlit_app/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run payment due email job
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          MANUAL_JOB:         ${{ github.event.inputs.job }}
        run: |
          cd streamlit_app

          # Map cron schedule → SLOT
          SCHEDULE="${{ github.event.schedule }}"
          if   [ "$SCHEDULE" = "30 4 * * *" ]; then export SLOT=morning
          elif [ "$SCHEDULE" = "30 5 * * *" ]; then export SLOT=reminder
          fi

          echo "SLOT=${SLOT:-unset}  SCHEDULE=${SCHEDULE:-manual}  MANUAL_JOB=${MANUAL_JOB:-}"
          python payment_email_job.py
