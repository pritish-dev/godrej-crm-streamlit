name: 4S Interiors CRM Emails
 
on:
  schedule:
    # All times in UTC.  IST = UTC + 5:30
    - cron: '32 4 * * *'    # 10:02 AM IST  →  Morning Digest
    - cron: '32 5 * * *'    # 11:02 AM IST  →  Update Reminder
    - cron: '32 11 * * *'   # 05:02 PM IST  →  Evening Digest
 
  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:
    inputs:
      job:
        description: 'Which 4S job to run'
        required: true
        default: 'fours_email1'
        type: choice
        options:
          - fours_email1
          - fours_email2
          - fours_email3
 
jobs:
  # ── 4S INTERIORS CRM EMAILS ────────────────────────────────────────────────
  fours-crm-email:
    runs-on: ubuntu-latest
 
    # FIX: explicit parentheses prevent operator-precedence issues.
    # schedule events always pass; workflow_dispatch only passes for the
    # three valid job values.
    if: >-
      github.event_name == 'schedule' ||
      (
        github.event_name == 'workflow_dispatch' &&
        (
          github.event.inputs.job == 'fours_email1' ||
          github.event.inputs.job == 'fours_email2' ||
          github.event.inputs.job == 'fours_email3'
        )
      )
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4        # FIX: v3 (Node 16) → v4 (Node 20)
 
      - name: Set up Python
        uses: actions/setup-python@v5   # FIX: v4 (Node 16) → v5 (Node 20)
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        # FIX: install from the same directory the script lives in,
        # so any extra deps in streamlit_app/requirements.txt are picked up.
        # Also falls back to root requirements.txt if that file doesn't exist.
        run: |
          if [ -f streamlit_app/requirements.txt ]; then
            pip install -r streamlit_app/requirements.txt
          else
            pip install -r requirements.txt
          fi
 
      - name: Run 4S Interiors email job
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          MANUAL_JOB:         ${{ github.event.inputs.job }}
        run: |
          cd streamlit_app
          python email_job_4s.py