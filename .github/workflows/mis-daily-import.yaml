name: MIS + Stock Daily Import (Mon–Sat, 11 AM + 2 PM IST)

# Runs Mon–Sat only (skips Sunday). Two windows per day:
#   • Morning  ~11 AM IST — catches emails that arrive before noon
#   • Afternoon ~2 PM IST — catches emails delivered mid-afternoon
# IST = UTC + 5:30  →  11:00 IST = 05:30 UTC,  14:00 IST = 08:30 UTC
#
# Both steps are idempotent — safe to re-run. The afternoon run simply
# overwrites the sheet with the same data if the email hasn't changed.
#
# This single job handles BOTH imports from the same BR_MIS Excel attachment:
#   Step 1 — reads the 'PO'    sheet tab → writes to 'MIS_Daily' Google Sheet
#   Step 2 — reads the 'STOCK' sheet tab → writes to 'Stock'    Google Sheet
#
# WHY MULTIPLE CRONS PER WINDOW?
# GitHub Actions free-tier crons are *best-effort* — runs can be delayed
# 5–30 minutes. Two crons per window ensure at least one fires near the target.

on:
  schedule:
    - cron: '25 5 * * 1-6'      # 05:25 UTC = 10:55 IST  Mon–Sat (morning, early)
    - cron: '45 5 * * 1-6'      # 05:45 UTC = 11:15 IST  Mon–Sat (morning, backup)
    - cron: '00 9 * * 1-6'      # 09:00 UTC = 14:30 IST  Mon–Sat (afternoon, primary)
    - cron: '30 9 * * 1-6'      # 09:30 UTC = 15:00 IST  Mon–Sat (afternoon, backup)

  # Manual trigger from the Actions UI for backfill / debugging
  workflow_dispatch:

# Cancel an older in-flight run if a new one is queued
concurrency:
  group: mis-daily-import
  cancel-in-progress: false

jobs:
  mis-daily-import:
    name: Fetch BR_MIS Excel — import MIS (PO sheet) + Stock (STOCK sheet)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f streamlit_app/requirements.txt ]; then
            pip install -r streamlit_app/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run MIS + Stock Daily Import
        env:
          # Gmail IMAP — same credentials used by the lead-email-import job
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}

          # Service-account JSON for writing the MIS_Daily sheet
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          cd streamlit_app
          python mis_daily_import_job.py
