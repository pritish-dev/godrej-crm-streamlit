name: Delivery Alert

on:
  schedule:
    - cron: '30 4 * * *'  # 10:00 AM IST (UTC+5:30)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run delivery alert script
        run: python scripts/run_delivery_alert.py